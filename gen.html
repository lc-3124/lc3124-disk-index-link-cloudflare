<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lc3124的下载站：身份校验！</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", "Microsoft YaHei", Arial, sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .container {
      max-width: 700px;
      width: 100%;
      padding: 40px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    /* 标题样式 */
    .page-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    
    .title-divider {
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, #4299e1, #38b2ac);
      margin: 0 auto 30px;
      border-radius: 3px;
    }
    
    /* 身份验证提示板块 - 移除锁图标相关样式 */
    .auth-tip {
      background: linear-gradient(135deg, #e8f4f8 0%, #f0f8fb 100%);
      border: 1px solid #dee2e6;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 30px;
      position: relative;
      /* 移除左侧padding，因为不需要给图标留位置 */
      padding-left: 20px;
    }
    
    /* 删除锁图标伪元素样式 */
    /* .auth-tip::before { 已删除 } */
    
    .auth-tip p {
      color: #2d3748;
      line-height: 1.8;
      font-size: 15px;
    }
    
    .auth-tip p strong {
      color: #4299e1;
      font-weight: 600;
    }
    
    .auth-tip p.warning {
      color: #e53e3e;
      font-weight: 600;
      margin-top: 8px;
    }
    
    .input-group {
      margin: 25px 0;
    }
    
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #2d3748;
      font-size: 15px;
      letter-spacing: 0.3px;
    }
    
    input {
      width: 100%;
      padding: 15px 20px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s ease;
      background-color: #f8fafc;
    }
    
    input:focus {
      outline: none;
      border-color: #4299e1;
      box-shadow: 0 0 0 4px rgba(66, 153, 225, 0.1);
      background-color: #ffffff;
    }
    
    input[type="password"] {
      font-family: "Courier New", monospace;
    }
    
    button {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #4299e1 0%, #38b2ac 100%);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 600;
      transition: all 0.3s ease;
      margin-top: 15px;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 12px rgba(66, 153, 225, 0.2);
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(66, 153, 225, 0.3);
    }
    
    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(66, 153, 225, 0.2);
    }
    
    #result {
      margin-top: 30px;
      padding: 20px;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      word-break: break-all;
      font-size: 15px;
      line-height: 1.8;
      min-height: 80px;
      background-color: #f8fafc;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .sdk-error {
      color: #ed8936;
      padding: 18px;
      background: #fef7fb;
      border-radius: 12px;
      margin-bottom: 25px;
      display: none;
      border-left: 4px solid #ed8936;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(237, 137, 54, 0.1);
    }
    
    .success {
      color: #38a169;
      font-weight: 600;
    }
    
    .error {
      color: #e53e3e;
      font-weight: 600;
    }
    
    /* 响应式优化 */
    @media (max-width: 768px) {
      .container {
        padding: 30px 20px;
      }
      
      .page-title {
        font-size: 20px;
      }
      
      .auth-tip {
        padding: 15px;
        /* 同步移除响应式下的左侧额外padding */
        padding-left: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 页面标题 -->
    <h1 class="page-title">Lc3124的下载站：身份校验！</h1>
    <div class="title-divider"></div>
    
    <!-- SDK加载失败提示 -->
    <div id="sdkError" class="sdk-error">
      OSS SDK加载失败！<br>1. 检查oss-sdk.min.js是否和本文件同目录；<br>2. 确认文件为官方正版。
    </div>

    <!-- 身份验证提示板块 -->
    <div class="auth-tip">
      <p>为了防止链接滥用，我开启了访问控制！请验证你的身份后点击下载！</p>
      <p>链接获取方式为使用密钥临时生成，链接一小时过期！</p>
      <p>密钥验证方式：输入lc给你的<strong>AccessKeyId</strong>和<strong>AccessKeySecret</strong>！</p>
      <p>没有这些东西？！<br>请找lc去要一份哦～</p>
      <p class="warning">注意！AccessKey一定一定不要透露出去！</p>
    </div>

    <!-- 输入区域 -->
    <div class="input-group">
      <label for="accessKeyId">AccessKeyId：</label>
      <input type="text" id="accessKeyId" placeholder="AccessKeyId" value="">
    </div>

    <div class="input-group">
      <label for="accessKeySecret">AccessKeySecret：</label>
      <input type="password" id="accessKeySecret" placeholder="AccessKeySecret" value="">
    </div>

    <div class="input-group">
      <label for="bucket">Bucket名称：</label>
      <input type="text" id="bucket" placeholder="Bucket名称" value="lc3124-web-disk">
    </div>

    <div class="input-group">
      <label for="region">Bucket地域：</label>
      <input type="text" id="region" placeholder="Bucket地域" value="oss-cn-beijing">
    </div>

    <div class="input-group">
      <label for="objectName">文件路径：</label>
      <input type="text" id="objectName" placeholder="例如：/files/photo/avatar.png">
    </div>

    <div class="input-group">
      <label for="expires">有效期（秒）：</label>
      <input type="number" id="expires" placeholder="3600" value="3600" min="300" max="86400">
    </div>

    <button onclick="generateOssUrl()">直接下载</button>
    <div id="result">点击按钮开始下载</div>
  </div>

  <script src="./oss-sdk.min.js" 
          onload="console.log('OSS SDK加载成功')" 
          onerror="document.getElementById('sdkError').style.display='block'">
  </script>

  <script>
    // 解析URL参数
    function getUrlParam(name) {
      const reg = new RegExp(`(^|&)${name}=([^&]*)(&|$)`);
      const r = window.location.search.substr(1).match(reg);
      if (r != null) return decodeURIComponent(r[2]);
      return '';
    }

    // 核心下载函数
    async function generateOssUrl() {
      // 检查OSS SDK
      if (typeof OSS === 'undefined') {
        document.getElementById('result').innerHTML = '<span class="error">错误：OSS SDK未加载成功！</span>';
        return;
      }

      // 获取并校验输入值
      const accessKeyId = document.getElementById('accessKeyId').value.trim();
      const accessKeySecret = document.getElementById('accessKeySecret').value.trim();
      const bucket = document.getElementById('bucket').value.trim();
      const region = document.getElementById('region').value.trim();
      const objectName = document.getElementById('objectName').value.trim();
      const expires = parseInt(document.getElementById('expires').value) || 3600;

      // 校验非空
      if (!accessKeyId || !accessKeySecret || !bucket || !region || !objectName) {
        document.getElementById('result').innerHTML = '<span class="error">错误：所有输入项均不能为空！</span>';
        return;
      }

      // 校验有效期范围
      if (expires < 300 || expires > 86400) {
        document.getElementById('result').innerHTML = '<span class="error">错误：有效期需在300-86400秒之间！</span>';
        return;
      }

      try {
        // 创建OSS客户端
        const client = new OSS({
          accessKeyId: accessKeyId,
          accessKeySecret: accessKeySecret,
          bucket: bucket,
          region: region
        });

        // 生成签名URL
        const downloadUrl = client.signatureUrl(objectName, {
          expires: expires,
          method: 'GET'
        });

        // 显示提示并跳转下载
        document.getElementById('result').innerHTML = '<span class="success">✅ 身份验证通过，正在跳转下载...页面将在5秒后自动关闭</span>';
        window.open(downloadUrl, '_blank');

        // 延迟5秒自动关闭当前页面（给下载跳转留足够时间）
        setTimeout(() => {
          // 处理浏览器安全限制：只有通过JS打开的窗口才能被JS关闭
          // 如果是用户手动打开的页面，关闭可能失败，增加提示
          try {
            window.close();
          } catch (e) {
            document.getElementById('result').innerHTML = '<span class="success">✅ 下载链接已打开，请手动关闭本页面</span>';
          }
        }, 5000);

      } catch (error) {
        // 捕获并展示错误
        document.getElementById('result').innerHTML = `
          <span class="error">❌ 下载失败：${error.message}</span>
        `;
        console.error('下载失败详情：', error);
      }
    }

    // 页面加载初始化
    window.onload = function() {
      // 检查SDK状态
      if (typeof OSS === 'undefined') {
        document.getElementById('sdkError').style.display = 'block';
      }
      
      // 读取URL中的path参数填充文件路径
      const defaultPath = getUrlParam('path');
      if (defaultPath) {
        document.getElementById('objectName').value = defaultPath;
      }
    };
  </script>
</body>
</html>
